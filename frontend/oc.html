<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Órdenes de Compra | Transformadores ERP</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="navbar">
  <a href="dashboard.html" class="navbar-brand">
    <i class="fas fa-bolt"></i> TRANSFORMADORES ERP
  </a>
  <div class="navbar-menu">
    <button data-roles="admin,control,operario,empleado" onclick="window.location.href='dashboard.html'"><i class="fas fa-tachometer-alt"></i> Dashboard</button>
    <button data-roles="admin,control" onclick="window.location.href='ficha.html'"><i class="fas fa-file-alt"></i> Fichas Técnicas</button>
    <button data-roles="admin,control" onclick="window.location.href='oc.html'" class="active"><i class="fas fa-shopping-cart"></i> Órdenes de Compra</button>
    <button data-roles="admin,control" onclick="window.location.href='ventas.html'"><i class="fas fa-chart-line"></i> Ventas</button>
    <button data-roles="admin,control" onclick="window.location.href='clientes.html'"><i class="fas fa-users"></i> Clientes</button>
    <button data-roles="admin,control" onclick="window.location.href='proveedores.html'"><i class="fas fa-truck"></i> Proveedores</button>
    <button data-roles="admin,control" onclick="window.location.href='facturas-compra.html'"><i class="fas fa-file-invoice"></i> Facturas</button>
    <button data-roles="admin,control" onclick="window.location.href='pagos-proveedores.html'"><i class="fas fa-credit-card"></i> Pagos</button>
    <button data-roles="admin,control" onclick="window.location.href='stock.html'"><i class="fas fa-boxes"></i> Stock</button>
    <button data-roles="admin,control" onclick="window.location.href='reportes.html'"><i class="fas fa-chart-bar"></i> Reportes</button>
    <button data-roles="admin,operario,empleado" onclick="window.location.href='produccion.html'"><i class="fas fa-industry"></i> Producción</button>
    <button data-roles="admin" onclick="window.location.href='usuarios.html'"><i class="fas fa-user-cog"></i> Usuarios</button>
    <button data-roles="admin" onclick="window.location.href='precios.html'"><i class="fas fa-tags"></i> Precios</button>
  </div>
  <button class="btn btn-danger btn-sm" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</button>
</div>

<div class="container">
  <div class="page-header">
    <h1><i class="fas fa-shopping-cart"></i> Órdenes de Compra</h1>
    <p>Gestión de órdenes de compra de clientes</p>
  </div>
  
  <div class="card">
    <div class="card-header">
      <h2><i class="fas fa-plus-circle"></i> Nueva Orden de Compra</h2>
    </div>
    <div class="card-body">
      <form id="ocForm" class="form-grid">
        <div class="form-group full-width">
          <label for="cliente_id"><i class="fas fa-user"></i> Cliente *</label>
          <select id="cliente_id" required class="form-control">
            <option value="">-- Seleccionar Cliente --</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="numero_oc"><i class="fas fa-hashtag"></i> N° OC *</label>
          <input type="text" id="numero_oc" required class="form-control" placeholder="Ej: OC-2024-001">
        </div>
        
        <div class="form-group">
          <label for="fecha_oc"><i class="fas fa-calendar"></i> Fecha *</label>
          <input type="date" id="fecha_oc" required class="form-control">
        </div>
        
        <div class="form-group full-width">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Crear Orden de Compra
          </button>
        </div>
      </form>
    </div>
  </div>
  
  <div class="card">
    <div class="card-header">
      <h2><i class="fas fa-list"></i> Lista de Órdenes de Compra</h2>
    </div>
    <div class="card-body">
      <ul id="listaOC" class="oc-list"></ul>
    </div>
  </div>
  
  <div class="action-buttons">
    <button class="btn btn-secondary" onclick="window.location.href='dashboard.html'">
      <i class="fas fa-arrow-left"></i> Volver al Dashboard
    </button>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/oc.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
